<svg width="700" height="370" viewBox="0 0 700 370" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .card {
      fill: #161b22;
      stroke: #30363d;
      stroke-width: 1.5;
      rx: 14;
    }
    .label {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      fill: #c9d1d9;
      text-anchor: middle;
      font-weight: 600;
    }
    .icon-group {
      transform-box: fill-box;
      transform-origin: center;
      animation: float 2.4s ease-in-out infinite;
    }
    @keyframes float {
      0%   { transform: translateY(0px) scale(1); }
      50%  { transform: translateY(-8px) scale(1.08); }
      100% { transform: translateY(0px) scale(1); }
    }
    .card-group {
      transform-box: fill-box;
      transform-origin: center;
      animation: glow 2.4s ease-in-out infinite;
    }
    @keyframes glow {
      0%   { filter: drop-shadow(0 0 0px rgba(88,166,255,0)); }
      50%  { filter: drop-shadow(0 0 8px rgba(88,166,255,0.55)); }
      100% { filter: drop-shadow(0 0 0px rgba(88,166,255,0)); }
    }
  </style>
</defs>
